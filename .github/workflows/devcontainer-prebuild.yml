name: Devcontainer Prebuild

on:
  push:
    branches: [main]
    paths:
      - ".devcontainer/**"
      - ".dockerignore"
      - "Gemfile"
      - "Gemfile.lock"
      - "*.gemspec"
      - ".github/workflows/devcontainer-prebuild.yml"
  workflow_dispatch:

jobs:
  prebuild:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            devpod_arch: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            devpod_arch: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install DevPod CLI
        run: |
          curl -L -o devpod "https://github.com/skevetter/devpod/releases/latest/download/devpod-linux-${{ matrix.devpod_arch }}"
          sudo install -c -m 0755 devpod /usr/local/bin
          devpod version

      - name: Configure DevPod docker provider
        run: |
          devpod provider add docker --silent || devpod provider use docker

      - name: Build and push prebuild image
        run: |
          devpod build . --repository ghcr.io/kjeldahl/ruby-dcb --platform ${{ matrix.platform }}
