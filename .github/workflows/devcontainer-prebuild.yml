name: Devcontainer Prebuild

on:
  push:
    branches: [main]
    paths:
      - ".devcontainer/**"
      - "Gemfile"
      - "Gemfile.lock"
      - "dcb_event_store.gemspec"
      - ".github/workflows/devcontainer-prebuild.yml"
  workflow_dispatch:

jobs:
  prebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install DevPod CLI
        run: |
          curl -L -o devpod "https://github.com/skevetter/devpod/releases/latest/download/devpod-linux-amd64"
          sudo install -c -m 0755 devpod /usr/local/bin
          devpod version

      - name: Configure DevPod docker provider
        run: |
          devpod provider add docker --silent || devpod provider use docker

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build and push prebuild image
        run: |
          devpod build . --repository ghcr.io/kjeldahl/ruby-dcb --platform linux/amd64,linux/arm64
