name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - run: bundle exec rubocop lib/ test/

  test:
    runs-on: ubuntu-latest
    env:
      PGHOST: localhost
      PGUSER: postgres
      PGPASSWORD: postgres
    strategy:
      matrix:
        ruby-version: ["3.3", "3.4", "4.0"]
    steps:
      - uses: actions/checkout@v5
      - name: Start PostgreSQL
        run: |
          sudo systemctl start postgresql.service
          sudo -u postgres psql -c "ALTER USER postgres PASSWORD 'postgres';"
          sudo -u postgres createdb dcb_event_store_test
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true
      - name: Verify gem loads
        run: ruby -e "require './lib/dcb_event_store'; puts DcbEventStore::VERSION"
      - name: Run tests
        run: bundle exec rake
      - name: Upload coverage report
        if: always() && matrix.ruby-version == '3.4'
        uses: actions/upload-artifact@v5
        with:
          name: coverage-report-${{ github.sha }}
          path: coverage/
          retention-days: 30

  coverage-report:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      PGHOST: localhost
      PGUSER: postgres
      PGPASSWORD: postgres
    steps:
      - uses: actions/checkout@v5

      - name: Download coverage
        uses: actions/download-artifact@v5
        with:
          name: coverage-report-${{ github.sha }}
          path: coverage-pr/

      - name: Start PostgreSQL
        if: github.event_name == 'pull_request'
        run: |
          sudo systemctl start postgresql.service
          sudo -u postgres psql -c "ALTER USER postgres PASSWORD 'postgres';"
          sudo -u postgres createdb dcb_event_store_test

      - uses: ruby/setup-ruby@v1
        if: github.event_name == 'pull_request'
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Generate base branch coverage
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin ${{ github.base_ref }}
          git checkout origin/${{ github.base_ref }}
          bundle install
          bundle exec rake || true
          cp coverage/coverage.json /tmp/base_coverage.json || true

      - name: Checkout back to PR
        if: github.event_name == 'pull_request'
        run: git checkout ${{ github.sha }}

      - name: Generate coverage change report
        run: |
          if [ -f /tmp/base_coverage.json ] && [ -f coverage-pr/coverage.json ]; then
            ruby scripts/coverage_report.rb /tmp/base_coverage.json coverage-pr/coverage.json > coverage_summary.md
          else
            ruby scripts/coverage_report.rb coverage-pr/coverage.json > coverage_summary.md
          fi
          cat coverage_summary.md

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage
          path: coverage_summary.md

      - name: Upload coverage summary
        uses: actions/upload-artifact@v5
        with:
          name: coverage-summary
          path: coverage_summary.md
          retention-days: 30
